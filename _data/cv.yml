cv:
  name: Iffat Nowshin
  label: Lecturer, Electrical and Electronic Engineering
  location: Dhaka, Bangladesh
  summary: Lecturer in the Department of Electrical and Electronic Engineering (EEE) with a strong research focus on Renewable Energy, Power Electronics, and Applied Machine Learning. Key areas include the optimization of photovoltaic (PV) systems, advanced inverter topologies for grid-connected energy harvesting, and techno-economic analysis of hybrid energy systems.

